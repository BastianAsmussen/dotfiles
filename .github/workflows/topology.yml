name: Topology
on:
  workflow_run:
    workflows: ["Flake Check"]
    types: [completed]
    branches: [master]

jobs:
  topology:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: DeterminateSystems/nix-installer-action@92148bb48b9a0c5458c53dd0b368fbfbfbaa3210 # main 2026-04-17
        with:
          extra-conf: extra-platforms = aarch64-linux

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: arm64

      - uses: DeterminateSystems/magic-nix-cache-action@b4a9864e3a8ab8179be30f2e70fd71fe9996bb9d # main 2026-04-17
      - name: Setup SSH Key
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Pinned Codeberg host key — avoids TOFU attack on ssh-keyscan
          echo "codeberg.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIVIC02vnjFyL+I4RHfvIGNtOgJMe769VTF1VR4EB3ZB" >> ~/.ssh/known_hosts

      - name: Build Topology
        run: nix build .#topology.x86_64-linux.config.output

      - name: Copy Topology Image
        run: |
          mkdir -p docs
          cp result/main.svg docs/topology.svg

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/topology.svg
          git diff --cached --quiet || git commit -m "docs: update topology diagram"
          git push
