name: Release ISO
on:
  workflow_run:
    workflows: ["Flake Check"]
    types: [completed]
    branches: [master]

jobs:
  release-iso:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: DeterminateSystems/nix-installer-action@92148bb48b9a0c5458c53dd0b368fbfbfbaa3210 # main 2026-04-17
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1073741824
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never
      - name: Setup SSH Key
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          echo "codeberg.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIVIC02vnjFyL+I4RHfvIGNtOgJMe769VTF1VR4EB3ZB" >> ~/.ssh/known_hosts

      # Compute a deterministic derivation path for the ISO image. The ISO
      # config embeds `builtins.currentTime` (impure) and
      # `system.configurationRevision` (depends on `self.shortRev`, which
      # changes every commit). `mkForce` (priority 50) beats `mkDefault`
      # (priority 1000), so these impure/volatile values are replaced with
      # static strings and the derivation path only changes when the real
      # config changes.
      - name: Compute deterministic ISO derivation path
        id: drv
        run: |
          STORE_PATH=$(nix eval --raw \
            '.#nixosConfigurations.iso' \
            --apply '
              iso: (iso.extendModules {
                modules = [
                  ({ lib, ... }: {
                    environment.etc.isoBuildTime.text = lib.mkForce "deterministic";
                    system.configurationRevision = lib.mkForce "deterministic";
                  })
                ];
              }).config.system.build.isoImage.drvPath
            ')

          echo "store_path=$STORE_PATH" >> "$GITHUB_OUTPUT"
          echo "Deterministic ISO derivation path: $STORE_PATH"

      - name: Check if ISO changed since last release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT="${{ steps.drv.outputs.store_path }}"
          LATEST=$(gh release view --json body --jq '.body' 2>/dev/null \
            | grep -oP '(?<=Derivation Path:\*\* `)[^`]+' || true)

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ISO unchanged, skipping release..."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "ISO changed ($LATEST → $CURRENT), building release..."
          fi

      - name: Build ISO image
        if: steps.check.outputs.changed == 'true'
        run: nix build .#nixosConfigurations.iso.config.system.build.isoImage --impure

      - name: Create GitHub release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="iso-$(date -u +%Y%m%d-%H%M%S)"
          ISO=$(ls result/iso/*.iso)
          SHA256=$(sha256sum "$ISO" | cut -d' ' -f1)
          SHORT=$(git rev-parse --short HEAD)
          LONG=$(git rev-parse HEAD)
          URL="${{ github.server_url }}/${{ github.repository }}/commit/$LONG"
          DRV="${{ steps.drv.outputs.store_path }}"
          NOTES="Automated ISO build from [\`$SHORT\`]($URL).

          **SHA-256:** \`$SHA256\`
          **Derivation Path:** \`$DRV\`"

          gh release create "$TAG" "$ISO" \
            --title "NixOS Installer ISO - $(date -u +%Y-%m-%d)" \
            --latest \
            --notes "$NOTES"
